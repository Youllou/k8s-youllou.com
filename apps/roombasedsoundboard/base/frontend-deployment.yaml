apiVersion: apps/v1
kind: Deployment
metadata:
  name: rmbsndb-frontend
  annotations:
    kube-score/ignore: pod-networkpolicy,container-image-tag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roombasedsoundboard
      component: frontend
  template:
    metadata:
      labels:
        app: roombasedsoundboard
        component: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-deploy-token
      containers:
        - name: rmbsndb-frontend
          image: ghcr.io/youllou/roombased_soundboard-frontend:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: rmbsndb-secrets
