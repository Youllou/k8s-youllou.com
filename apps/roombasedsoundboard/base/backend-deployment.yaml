apiVersion: apps/v1
kind: Deployment
metadata:
  name: rmbsndb-backend
  annotations:
    kube-score/ignore: pod-networkpolicy,container-image-tag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roombasedsoundboard
  template:
    metadata:
      labels:
        app: roombasedsoundboard
    spec:
      imagePullSecrets:
        - name: ghcr-deploy-token
      containers:
        - name: rmbsndb-backend
          image: ghcr.io/youllou/roombased_soundboard-backend:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: rmbsndb-secrets
         readinessProbe:
           httpGet:
             path: /api/health
             port: 8080
           initialDelaySeconds: 3
           periodSeconds: 5
         livenessProbe:
           httpGet:
             path: /api/health
             port: 8080
           initialDelaySeconds: 10
           periodSeconds: 10
