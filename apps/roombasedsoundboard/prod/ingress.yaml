apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rmbsndb
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - soundboard.youllou.com
        - api.soundboard.youllou.com
      secretName: rmbsndb-tls
    - hosts:
        - etscrap.xyz
        - api.etscrap.xyz
      secretName: rmbsndb-etscrap-tls
  rules:
    - host: soundboard.youllou.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rmbsndb-frontend
                port:
                  number: 80
    - host: api.soundboard.youllou.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rmbsndb-backend
                port:
                  number: 8000
    - host: etscrap.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rmbsndb-frontend
                port:
                  number: 80
    - host: api.etscrap.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rmbsndb-backend
                port:
                  number: 8000
