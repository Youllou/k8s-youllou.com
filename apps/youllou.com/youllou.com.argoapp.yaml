apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: youllou
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: webapp=ghcr.io/youllou/youllou.com:latest
    argocd-image-updater.argoproj.io/webapp.update-strategy: digest
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: youllou
  source:
    repoURL: git@github.com:Youllou/k8s-youllou.com.git
    targetRevision: main
    path: apps/youllou.com/prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
