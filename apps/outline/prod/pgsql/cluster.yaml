apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: outline-pg
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3
  affinity:
    podAntiAffinityType: preferred
  storage:
    size: 2Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: outline
      owner: outline
